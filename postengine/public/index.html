<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PostEngine v3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap');
:root {
  --bg:#FAF1E8;--surface:#FEFAF5;--border:#DCD0BC;
  --text:#161616;--soft:#6E6557;
  --indigo:#3B43F0;--indigo-bg:#E2E2FB;
  --green:#1A7A4A;--green-bg:#E2F5EC;
  --amber-bg:#FCF8F0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;line-height:1.7;-webkit-font-smoothing:antialiased;}
.wrap{max-width:820px;margin:0 auto;padding:32px 24px 80px 28px;border-left:1px solid var(--text);}

.header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--text);flex-wrap:wrap;}
.header h1{font-weight:900;font-size:30px;letter-spacing:.01em;}
.header-sub{font-size:13px;color:var(--soft);margin-top:2px;}
.countdown{flex-shrink:0;border:1px solid var(--soft);color:var(--soft);background:var(--amber-bg);border-radius:999px;padding:7px 14px;font-size:12.5px;font-weight:500;white-space:nowrap;}
.countdown b{font-family:monospace;font-size:13px;}

.card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:16px;}
.card::before{content:'';position:absolute;top:7px;left:7px;width:10px;height:10px;border-top:1.5px solid var(--indigo);border-left:1.5px solid var(--indigo);opacity:.5;}
.card::after{content:'';position:absolute;bottom:7px;right:7px;width:10px;height:10px;border-bottom:1.5px solid var(--indigo);border-right:1.5px solid var(--indigo);opacity:.5;}
.card-title{font-size:12px;font-weight:700;color:var(--soft);letter-spacing:.06em;margin-bottom:12px;}

.input-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
input[type=text],input[type=password],textarea{font-family:inherit;font-size:13.5px;color:var(--text);border:1px solid var(--border);border-radius:4px;background:#fff;}
input[type=text],input[type=password]{padding:8px 10px;width:100%;}
textarea{padding:12px;resize:vertical;min-height:80px;width:100%;}
input:focus,textarea:focus{outline:2px solid var(--indigo);border-color:var(--indigo);}
.flex-input{flex:1;min-width:160px;}

.btn{font-family:inherit;font-size:13px;font-weight:600;border-radius:6px;padding:8px 16px;cursor:pointer;border:1px solid transparent;white-space:nowrap;}
.btn-primary{background:var(--indigo);color:#fff;}
.btn-primary:hover{background:#2A30D0;}
.btn-primary:disabled{background:#C9BFA9;color:var(--text);cursor:wait;}
.btn-ghost{background:transparent;color:var(--soft);border-color:var(--border);}
.btn-ghost:hover{background:var(--bg);}
.btn-green{background:var(--green-bg);color:var(--green);border-color:var(--green);font-size:12px;padding:5px 12px;}
.btn-green:hover{background:#C5EDD8;}
.btn-green:disabled{opacity:.5;cursor:wait;}
.btn-copy{font-family:inherit;font-size:12px;color:var(--indigo);background:var(--indigo-bg);border:none;border-radius:4px;padding:4px 9px;cursor:pointer;}
.btn-copy:hover{background:#C7CCF5;}

.notion-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border-radius:4px;font-weight:500;}
.badge-ok{background:var(--green-bg);color:var(--green);}
.badge-err{background:#FEE2E2;color:#991B1B;}
.badge-idle{background:var(--bg);color:var(--soft);border:1px solid var(--border);}

.tabs{display:flex;border-bottom:1px solid var(--border);margin:24px 0 0;}
.tab{font-family:inherit;font-size:13px;font-weight:600;background:none;border:none;border-bottom:2.5px solid transparent;padding:8px 16px;cursor:pointer;color:var(--soft);margin-bottom:-1px;}
.tab.active{color:var(--indigo);border-bottom-color:var(--indigo);}
.panel{display:none;padding-top:20px;}
.panel.active{display:block;}

.gen-area{text-align:center;padding:24px 16px;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:16px;}
.gen-btn{display:inline-flex;align-items:center;gap:8px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:15px;font-weight:700;color:#fff;background:var(--indigo);border:none;border-radius:6px;padding:14px 28px;cursor:pointer;transition:transform .15s,background .15s;}
.gen-btn:hover{background:#2A30D0;transform:translateY(-1px);}
.gen-btn:disabled{background:#C9BFA9;color:var(--text);cursor:wait;transform:none;}
.gen-sub{font-size:12px;color:var(--soft);margin-top:8px;}
.error-box{display:flex;align-items:flex-start;gap:8px;margin-top:12px;background:var(--amber-bg);border:1px dashed var(--border);border-radius:4px;padding:10px 14px;font-size:13px;text-align:left;}

.result-wrap{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:16px;}
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.result-ts{font-family:monospace;font-size:11.5px;color:var(--indigo);background:var(--indigo-bg);padding:3px 9px;border-radius:6px;}
.trend-label{font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--soft);margin-bottom:4px;}
.trend-text{font-size:13px;color:var(--soft);margin-bottom:16px;}
.draft-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px;}
.draft-grid-1{grid-template-columns:1fr;}
@media(max-width:580px){.draft-grid{grid-template-columns:1fr;}.header{flex-direction:column;}.input-row{flex-direction:column;}}
.draft-box{border:1px solid var(--border);border-radius:4px;padding:12px;background:#fff;}
.platform-tag{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.04em;padding:2px 9px;border-radius:999px;border:1px solid;margin-bottom:8px;}
.tag-tiktok{color:#FF0050;border-color:#FF0050;}
.tag-instagram{color:#C13584;border-color:#C13584;}
.tag-x{color:#1D9BF0;border-color:#1D9BF0;}
.tag-threads{color:#000;border-color:#000;}
.tag-note{color:#3EA44E;border-color:#3EA44E;}
.tag-hashtag{color:var(--soft);border-color:var(--soft);}
.tag-scene{color:var(--green);border-color:var(--green);}
.draft-text{font-size:13.5px;white-space:pre-wrap;word-break:break-word;margin-bottom:10px;}
.draft-foot{display:flex;justify-content:space-between;align-items:center;}
.char-count{font-size:11px;color:var(--soft);font-family:monospace;}
.notion-sent-badge{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--green);background:var(--green-bg);border-radius:4px;padding:4px 10px;margin-top:10px;}
.memo-wrap{margin-top:12px;}
.memo-label{font-size:11px;color:var(--soft);margin-bottom:4px;}

.profile-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.profile-text{font-size:13.5px;}
.profile-area{margin-top:12px;display:none;}
.profile-area.open{display:block;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--indigo);color:#fff;font-size:13px;padding:9px 18px;border-radius:999px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">

<div class="header">
  <div>
    <h1>PostEngine</h1>
    <div class="header-sub">地方エンジニア × 育児 × 移住 — 5プラットフォーム対応</div>
  </div>
  <div class="countdown" id="countdown">—</div>
</div>

<div class="card">
  <div class="card-title">NOTION 連携</div>
  <div class="input-row">
    <input class="flex-input" type="password" id="notionToken" placeholder="Integration Token（ntn_xxx…）">
    <input class="flex-input" type="text" id="notionDb" placeholder="SNS_POST_DB の ID（32桁）">
    <button class="btn btn-primary" id="notionSaveBtn">保存・確認</button>
    <span class="notion-badge badge-idle" id="notionBadge">未設定</span>
  </div>
  <p style="font-size:11.5px;color:var(--soft);margin-top:8px;">TokenとDB IDはlocalStorageに保存されます（このブラウザのみ）。Notion側でIntegrationをSNS_POST_DBに接続してください。</p>
</div>

<div class="card">
  <div class="card-title">プロフィール</div>
  <div class="profile-row">
    <div class="profile-text" id="profileDisplay"></div>
    <button class="btn btn-ghost" id="profileEditBtn" style="font-size:12px;padding:5px 10px;flex-shrink:0;">編集</button>
  </div>
  <div class="profile-area" id="profileArea">
    <textarea id="profileTextarea" style="margin-top:12px;"></textarea>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn btn-primary" id="profileSaveBtn">保存</button>
      <button class="btn btn-ghost" id="profileCancelBtn">キャンセル</button>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="video">📹 TikTok / Instagram</button>
  <button class="tab" data-tab="text">✏️ X / Threads</button>
  <button class="tab" data-tab="note">📝 note</button>
</div>

<div class="panel active" id="tab-video">
  <div class="gen-area">
    <button class="gen-btn" id="videoBtn">今日の動画キャプションを生成</button>
    <div class="gen-sub">視聴完了率・保存数を意識した構成 + シーン案</div>
    <div id="videoError"></div>
  </div>
  <div id="videoResult"></div>
</div>

<div class="panel" id="tab-text">
  <div class="gen-area">
    <button class="gen-btn" id="textBtn">今日のX / Threadsログを作成</button>
    <div class="gen-sub">フォロワー獲得・保存・リプライを意識した投稿</div>
    <div id="textError"></div>
  </div>
  <div id="textResult"></div>
</div>

<div class="panel" id="tab-note">
  <div class="gen-area">
    <button class="gen-btn" id="noteBtn">今週のnote記事ドラフトを生成</button>
    <div class="gen-sub">タイトル + 本文1,000〜1,200字（見出し付き）</div>
    <div id="noteError"></div>
  </div>
  <div id="noteResult"></div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
const DEFAULT_PROFILE = "地方在住のソフトウェアエンジニア。フルリモート勤務。妻の出産をきっかけに宇都宮に移住。10月に子どもが生まれる予定。地方で子育てしながら働く視点、リモートワークの工夫、エンジニアとしての日々の気づきを発信。コンセプト：地方エンジニア。目的はフォロワー獲得と収益化（コンサル相談・有料コンテンツ・アフィリエイト等）。誠実さと実体験ベースを優先し、煽りや誇張は避けたい。";

// APIはすべてVercelのサーバー関数経由で呼ぶ
const NOTION_PROXY = '/api/notion';
const CLAUDE_PROXY = '/api/claude';

const SP_VIDEO = `あなたはTikTok・Instagram Reelsのショート動画グロース専門家です。フォロワー1万人達成と収益化が目的です。
検索ツールで「今」TikTok・Instagramで伸びている関連コンテンツや切り口を1〜2回調べて参考にしてください。
以下を意識してキャプションとシーン構成を作成してください：
- 最初の1〜2行で視聴者が「自分ごと」に感じるフックを入れる
- 視聴完了率を上げるシーン構成案（3〜5シーン）を提案する
- 保存されやすい「持って帰れる情報」を1つ入れる
- ハッシュタグは10〜15個、バズりやすいものとニッチなものを混ぜる
- 誠実さを優先、誇張・煽りは避ける
出力はJSON形式のみ。最初の文字は必ず「{」。説明文・前置き・コードブロック記号は不要。文字列内でダブルクオート・バックスラッシュ・改行は使わないこと。
{"trend_summary":"傾向を1〜2文で","tiktok_caption":"TikTok用キャプション150字以内","instagram_caption":"Instagram用キャプション150字以内","hashtags":"#タグ1 #タグ2...（10〜15個）","scene_idea":"シーン構成案。各シーンを。で区切って1行で"}`;

const SP_TEXT = `あなたはX・ThreadsのSNSグロース専門家です。フォロワー獲得と収益化土台作りが目的です。
検索ツールで「今」X・Threadsで伸びている関連コンテンツや型を1〜2回調べて参考にしてください。
以下を意識して投稿ドラフトを作成してください：
- 最初の1行で具体的な悩み・気づき・数字を提示してフックにする
- 実体験・実数値・固有のディテールで差別化する
- 保存・引用・リプライしたくなる「持って帰れる情報」を1つ入れる
- 誠実さを優先、誇張・煽りは避ける
出力はJSON形式のみ。最初の文字は必ず「{」。説明文・前置き・コードブロック記号は不要。文字列内でダブルクオート・バックスラッシュ・改行は使わないこと。
{"trend_summary":"傾向を1〜2文で","x":"X用140字程度","threads":"Threads用150〜250字。会話的なトーン"}`;

const SP_NOTE = `あなたはnoteのコンテンツ戦略とライティングの専門家です。読者獲得と収益化（有料記事・コンサル・アフィリエイト）が目的です。
以下を意識して記事ドラフトを作成してください：
- 検索性と感情訴求を両立したタイトルを1つ
- 書き出しは具体的なエピソードや数字から始め、読者の悩みに直接刺さる内容にする
- 見出しは3〜5個、後半に「実践してわかったこと」や「次に繋がる行動」を入れる
- 収益化につながる文脈を1か所自然に入れる（押し売りにしない）
- 誠実さを優先、誇張・煽りは避ける
- 全体で1,000〜1,200字程度の本文を書く
出力はJSON形式のみ。最初の文字は必ず「{」。説明文・前置き・コードブロック記号は不要。文字列内でダブルクオート・バックスラッシュ・改行は使わないこと。見出しの区切りは【】で表現すること。
{"trend_summary":"今週のテーマ選定理由を1〜2文で","title":"記事タイトル","draft":"書き出し〜本文全文。【見出し】で区切る。1000〜1200字程度"}`;

let profile = DEFAULT_PROFILE;
let notionToken = '', notionDbId = '';
let toastTimer;

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}
function esc(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function nowLabel(){ const d=new Date(),w=['日','月','火','水','木','金','土'][d.getDay()]; return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} (${w}) ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function timeSlot(){ const h=new Date().getHours(); if(h>=6&&h<10)return '朝(7:00)'; if(h>=11&&h<14)return '昼(12:00)'; if(h>=19&&h<23)return '夜(21:00)'; return 'その他'; }

function updateCountdown(){
  const n=new Date(); let t=new Date(n.getFullYear(),9,1); if(n>t) t=new Date(n.getFullYear()+1,9,1);
  document.getElementById('countdown').innerHTML=`10月まで残り <b>${Math.ceil((t-n)/86400000)}</b> 日`;
}

function renderProfile(){
  const s=profile.length>90?profile.slice(0,90)+'…':profile;
  document.getElementById('profileDisplay').textContent=s;
  document.getElementById('profileTextarea').value=profile;
}

function loadFromStorage(){
  try{
    const t=localStorage.getItem('pe_notion_token');
    const d=localStorage.getItem('pe_notion_db');
    const p=localStorage.getItem('pe_profile');
    if(t){ notionToken=t; document.getElementById('notionToken').value=t; }
    if(d){ notionDbId=d; document.getElementById('notionDb').value=d; }
    if(p) profile=p;
    if(t&&d) setNotionBadge('idle');
  }catch(e){}
}

function setNotionBadge(state){
  const el=document.getElementById('notionBadge');
  el.className='notion-badge';
  if(state==='ok'){el.classList.add('badge-ok');el.textContent='✓ 連携中';}
  else if(state==='err'){el.classList.add('badge-err');el.textContent='✗ エラー';}
  else{el.classList.add('badge-idle');el.textContent=notionToken?'設定済み':'未設定';}
}

// Notion API（プロキシ経由）
async function notionFetch(path, method='GET', body=null){
  const dbId = notionDbId.replace(/-/g,'').replace(/(.{8})(.{4})(.{4})(.{4})(.{12})/,'$1-$2-$3-$4-$5');
  const resolvedPath = path.replace('{dbId}', dbId);
  const res = await fetch(`${NOTION_PROXY}/${resolvedPath}`, {
    method,
    headers: {
      'Authorization': `Bearer ${notionToken}`,
      'Notion-Version': '2022-06-28',
      'Content-Type': 'application/json',
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  return res;
}

async function testNotion(){
  try{
    const dbId = notionDbId.replace(/-/g,'').replace(/(.{8})(.{4})(.{4})(.{4})(.{12})/,'$1-$2-$3-$4-$5');
    const r = await notionFetch(`databases/${dbId}`);
    return r.ok;
  }catch(e){return false;}
}

async function sendNotion(platform, title, mainContent, extra=''){
  if(!notionToken||!notionDbId) return false;
  const dbId = notionDbId.replace(/-/g,'').replace(/(.{8})(.{4})(.{4})(.{4})(.{12})/,'$1-$2-$3-$4-$5');
  const fullText = extra ? mainContent+'\n\n'+extra : mainContent;
  const emoji = platform==='TikTok'?'🎵':platform==='Instagram'?'📸':platform==='X'?'✏️':platform==='Threads'?'🧵':'📝';
  const body={
    parent:{database_id:dbId},
    icon:{type:'emoji',emoji},
    properties:{
      '投稿タイトル・内容':{title:[{text:{content:title.slice(0,100)}}]},
      'プラットフォーム':{select:{name:platform}},
      'ステータス':{select:{name:'計画中'}},
      '投稿時間帯':{select:{name:timeSlot()}},
      '投稿日時':{date:{start:todayStr()}}
    },
    children:[{object:'block',type:'paragraph',paragraph:{rich_text:[{type:'text',text:{content:fullText.slice(0,2000)}}]}}]
  };
  try{
    const r = await fetch(`${NOTION_PROXY}/pages`, {
      method:'POST',
      headers:{
        'Authorization':`Bearer ${notionToken}`,
        'Notion-Version':'2022-06-28',
        'Content-Type':'application/json'
      },
      body:JSON.stringify(body)
    });
    return r.ok;
  }catch(e){return false;}
}

// Claude API（プロキシ経由）
async function callClaude(sp, um, mt=1200, search=true){
  const body={model:'claude-sonnet-4-6',max_tokens:mt,system:sp,messages:[{role:'user',content:um}]};
  if(search) body.tools=[{type:'web_search_20250305',name:'web_search'}];
  const r=await fetch(CLAUDE_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error('API '+r.status);
  const data=await r.json();
  const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
  const s=txt.indexOf('{'),e=txt.lastIndexOf('}');
  if(s===-1||e<=s) throw new Error('JSONが見つかりません: '+txt.slice(0,80));
  return JSON.parse(txt.slice(s,e+1));
}

async function copyText(text, btn){
  try{ await navigator.clipboard.writeText(text); btn.textContent='コピー済み'; setTimeout(()=>{btn.textContent='コピー';},1400); }
  catch(e){ toast('コピーに失敗しました'); }
}

function draftBox(tagClass, tagLabel, text, copyKey){
  return `<div class="draft-box">
    <div class="platform-tag ${tagClass}">${tagLabel}</div>
    <div class="draft-text">${esc(text)}</div>
    <div class="draft-foot">
      <span class="char-count">${(text||'').length}字</span>
      <button class="btn-copy" data-copy-key="${copyKey}">コピー</button>
    </div>
  </div>`;
}

async function generateVideo(){
  const btn=document.getElementById('videoBtn'),errEl=document.getElementById('videoError'),resEl=document.getElementById('videoResult');
  errEl.innerHTML=''; btn.disabled=true; btn.textContent='分析・生成中…（最大1分ほど）';
  try{
    const d=await callClaude(SP_VIDEO,`ペルソナ:\n${profile}\n\n今日のTikTok/Instagramキャプションを生成してください。`,1400,true);
    if(!d.tiktok_caption||!d.instagram_caption) throw new Error('レスポンスの形式が不正です');
    resEl.innerHTML=`
      <div class="result-wrap">
        <div class="result-header">
          <span class="result-ts">${nowLabel()}</span>
          <button class="btn btn-green" id="videoNotionBtn">Notionに記録する</button>
        </div>
        <div class="trend-label">TREND</div>
        <div class="trend-text">${esc(d.trend_summary)}</div>

        <div class="draft-grid draft-grid-1">
          ${draftBox('tag-hashtag','ハッシュタグ',d.hashtags,'hashtags')}
          ${draftBox('tag-scene','シーン構成案',d.scene_idea,'scene')}

          <div class="memo-label">メモ（視聴数・気づきを後で記入）</div>
          <input type="text" id="videoMemo" placeholder="例：視聴数500 / フックが弱かった">
        </div>
      </div>`;
    resEl.querySelectorAll('[data-copy-key]').forEach(b=>{
      b.addEventListener('click',()=>{
        const map={tiktok:d.tiktok_caption,instagram:d.instagram_caption,hashtags:d.hashtags,scene:d.scene_idea};

    });

      const nb=document.getElementById('videoNotionBtn'); nb.disabled=true; nb.textContent='送信中…';
      const memo=document.getElementById('videoMemo').value;
      const title=d.tiktok_caption.slice(0,40)||'動画投稿';
      const ok1=await sendNotion('TikTok',title,d.tiktok_caption,d.hashtags+'\n'+d.scene_idea+(memo?'\nメモ:'+memo:''));
      const ok2=await sendNotion('Instagram',title,d.instagram_caption,d.hashtags+(memo?'\nメモ:'+memo:''));
      if(ok1&&ok2){ nb.outerHTML=`<div class="notion-sent-badge">✓ SNS_POST_DBに記録しました（TikTok・Instagram）</div>`; toast('Notionに記録しました'); }
      else{ nb.disabled=false; nb.textContent='Notionに記録する'; toast('送信に失敗しました。設定を確認してください'); }
    });
    toast('キャプションを生成しました');
  }catch(e){
    errEl.innerHTML=`<div class="error-box">⚠️ 生成に失敗しました：${e.message}</div>`;
  }finally{ btn.disabled=false; btn.textContent='今日の動画キャプションを生成'; }
}

function wire(){
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('tab-'+t.dataset.tab).classList.add('active');
    });
  });
  document.getElementById('notionSaveBtn').addEventListener('click',async()=>{
    notionToken=document.getElementById('notionToken').value.trim();
    notionDbId=document.getElementById('notionDb').value.trim();
    if(!notionToken||!notionDbId){toast('TokenとDB IDを入力してください');return;}
    setNotionBadge('idle');
    const ok=await testNotion();
    if(ok){
      try{ localStorage.setItem('pe_notion_token',notionToken); localStorage.setItem('pe_notion_db',notionDbId); }catch(e){}
      setNotionBadge('ok'); toast('Notion連携に成功しました！');
    }else{ setNotionBadge('err'); toast('接続失敗。TokenとDB IDを確認してください'); }
  });
  document.getElementById('profileEditBtn').addEventListener('click',()=>document.getElementById('profileArea').classList.add('open'));
  document.getElementById('profileCancelBtn').addEventListener('click',()=>{ document.getElementById('profileTextarea').value=profile; document.getElementById('profileArea').classList.remove('open'); });
  document.getElementById('profileSaveBtn').addEventListener('click',()=>{
    const v=document.getElementById('profileTextarea').value.trim();
    profile=v||DEFAULT_PROFILE;
    try{ localStorage.setItem('pe_profile',profile); }catch(e){}
    renderProfile(); document.getElementById('profileArea').classList.remove('open'); toast('プロフィールを保存しました');
  });
  document.getElementById('videoBtn').addEventListener('click',generateVideo);
  document.getElementById('textBtn').addEventListener('click',generateText);
  document.getElementById('noteBtn').addEventListener('click',generateNote);
}

function init(){
  updateCountdown();
  setInterval(updateCountdown,1000*60*60);
  loadFromStorage();
  renderProfile();
  wire();
}
init();
</script>
